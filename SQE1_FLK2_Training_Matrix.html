<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SQE1 FLK2 Training Matrix</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0A0A14;color:#E8E8F0;font-family:Georgia,serif;min-height:100vh;}
button{font-family:Georgia,serif;cursor:pointer;}
input,textarea{font-family:Georgia,serif;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#0A0A14;}
::-webkit-scrollbar-thumb{background:#2a2a5a;border-radius:3px;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.5;}
#header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-bottom:1px solid #2a2a4a;padding:0 16px;}
#header-inner{max-width:1200px;margin:0 auto;}
#header-top{padding:20px 0 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
.hlabel{font-size:11px;letter-spacing:.2em;color:#7C7CCC;text-transform:uppercase;margin-bottom:4px;}
h1{font-size:22px;font-weight:normal;color:#E8E8FF;letter-spacing:-.5px;}
.hsub{font-size:12px;color:#6666AA;margin-top:4px;}
.bigpct{font-size:30px;font-weight:bold;text-align:right;}
.bigpct-lbl{font-size:11px;color:#6666AA;}
#pbars{display:grid;grid-template-columns:1fr;gap:10px;padding:12px 0 16px;}
.pb-lbl{display:flex;justify-content:space-between;margin-bottom:4px;}
.pb-lbl span{font-size:11px;color:#6666AA;text-transform:uppercase;letter-spacing:.1em;}
.pb-lbl em{font-size:11px;color:#A0A0CC;font-style:normal;}
.pb-track{height:6px;background:#1a1a3a;border-radius:3px;}
.pb-fill{height:100%;border-radius:3px;transition:width .4s;}
#nav{display:flex;border-top:1px solid #1a1a3a;}
.nav-btn{background:none;border:none;color:#6666AA;padding:10px 20px;font-size:13px;letter-spacing:.05em;border-bottom:2px solid transparent;}
.nav-btn.active{color:#8B8BFF;border-bottom-color:#8B8BFF;}
#main{max-width:1200px;margin:0 auto;padding:16px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.stat-card{background:#13132a;border:1px solid #1e1e3a;border-radius:12px;padding:14px 16px;}
.stat-lbl{font-size:11px;color:#6666AA;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;}
.stat-val{font-size:26px;font-weight:bold;line-height:1;}
.stat-sub{font-size:12px;color:#4a4a7a;margin-top:4px;}
.sec-title{font-size:13px;font-weight:normal;color:#8888BB;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;border-bottom:1px solid #1e1e3a;padding-bottom:10px;}
.subj-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.subj-card{background:#13132a;border:1px solid #1e1e3a;border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .2s;}
.subj-card:hover{border-color:#3a3a6a;}
.subj-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.subj-name{font-size:13px;font-weight:bold;margin-bottom:2px;}
.subj-s{font-size:11px;color:#4a4a7a;}
.subj-pct{font-size:28px;font-weight:bold;}
.subj-hint{margin-top:10px;font-size:11px;color:#4a4a7a;}
.key-card{background:#13132a;border:1px solid #1e1e3a;border-radius:12px;padding:14px 16px;margin-top:20px;}
.key-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.key-item{display:flex;align-items:center;gap:10px;}
.key-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.key-name{font-size:13px;color:#C0C0E0;}
.key-s{font-size:11px;color:#4a4a7a;}
.key-note{margin-top:16px;font-size:12px;color:#4a4a7a;border-top:1px solid #1e1e3a;padding-top:12px;}
#stabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.stab{border-radius:8px;border:1px solid #1e1e3a;background:#13132a;color:#6666AA;padding:8px 14px;font-size:12px;transition:all .2s;}
#mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
#mtitle{font-size:20px;font-weight:normal;}
#msub{font-size:12px;color:#4a4a7a;margin-top:4px;}
#mpct{font-size:28px;font-weight:bold;}
.secblock{margin-bottom:12px;}
.sechdr{width:100%;background:#13132a;border:1px solid #1e1e3a;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;text-align:left;color:#C0C0E0;font-size:14px;border-radius:10px;}
.sechdr.open{border-radius:10px 10px 0 0;}
.sechr{display:flex;gap:12px;align-items:center;}
.sectopics{border:1px solid #1e1e3a;border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.trow{border-bottom:1px solid #1a1a3a;}
.trow:last-child{border-bottom:none;}
.trow-main{padding:12px 18px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.ttext{flex:1;min-width:200px;font-size:13px;color:#B0B0D0;line-height:1.5;padding-top:2px;cursor:pointer;}
.cgrp{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.clbl{font-size:10px;color:#4a4a7a;margin-right:4px;white-space:nowrap;}
.cbtn{width:22px;height:22px;border-radius:4px;border:none;font-size:10px;color:white;font-weight:bold;}
.agrp{display:flex;gap:4px;flex-shrink:0;}
.abtn{width:28px;height:28px;border-radius:6px;border:1px solid #1a1a3a;background:transparent;font-size:13px;position:relative;display:flex;align-items:center;justify-content:center;}
.abadge{position:absolute;top:-4px;right:-4px;border-radius:50%;width:14px;height:14px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#fff;}
.tdetail{padding:0 18px 12px;}
.dlbl{font-size:11px;margin-bottom:4px;}
.dentry{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#6666AA;padding:2px 8px;background:#0A0A14;border-radius:4px;margin-bottom:2px;}
.ddel{background:none;border:none;color:#EF4444;font-size:13px;padding:0 2px;}
#moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#moverlay.show{display:flex;}
#mbox{background:#13132a;border:1px solid #2a2a5a;border-radius:12px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.mtlbl{font-size:11px;text-transform:uppercase;letter-spacing:.15em;margin-bottom:6px;}
.mtopic{font-size:14px;color:#C0C0E0;line-height:1.5;margin-bottom:16px;}
.flbl{font-size:11px;color:#6666AA;display:block;margin-bottom:4px;}
.finput{width:100%;background:#0A0A1A;border:1px solid #2a2a5a;border-radius:6px;color:#E8E8F0;padding:8px 10px;font-size:14px;font-family:Georgia,serif;}
.fgrp{margin-bottom:12px;}
.fgrpl{margin-bottom:16px;}
.prevlbl{font-size:11px;color:#6666AA;margin-bottom:6px;}
.prevrow{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#8888BB;padding:4px 0;border-bottom:1px solid #1a1a3a;}
.prevdel{background:none;border:none;color:#EF4444;font-size:14px;padding:0 4px;}
.mbtns{display:flex;gap:10px;margin-top:16px;}
.mok{flex:1;border:none;border-radius:8px;color:#fff;padding:10px;font-size:14px;font-family:Georgia,serif;}
.mcancel{flex:1;background:#1a1a3a;border:1px solid #2a2a5a;border-radius:8px;color:#8888BB;padding:10px;font-size:14px;font-family:Georgia,serif;}
@media(max-width:600px){.trow-main{flex-wrap:wrap;}.ttext{min-width:100%;}.cgrp,.agrp{flex-shrink:0;}}
@media(min-width:640px){
  #main{padding:24px;}
  .stat-grid{grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
  .stat-card{padding:20px 24px;}
  .stat-val{font-size:32px;}
  .subj-grid{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;}
  .subj-card{padding:20px 24px;}
  .key-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}
  .key-card{padding:20px 24px;margin-top:32px;}
  #pbars{grid-template-columns:1fr 1fr;gap:16px;padding:16px 0 20px;}
  h1{font-size:26px;}
  .bigpct{font-size:36px;}
  #header{padding:0 24px;}
}


.backup-row{display:flex;gap:10px;margin-top:16px;padding-top:12px;border-top:1px solid #1e1e3a;flex-wrap:wrap;}
.exp-btn{background:#1a1a3a;border:1px solid #2a2a5a;border-radius:8px;color:#8B8BFF;padding:9px 16px;font-size:13px;cursor:pointer;flex:1;min-width:120px;}
.exp-btn:hover{background:#2a2a5a;}
.imp-btn{background:#1a1a3a;border:1px solid #2a2a5a;border-radius:8px;color:#8B8BFF;padding:9px 16px;font-size:13px;cursor:pointer;flex:1;min-width:120px;text-align:center;display:block;}
.imp-btn:hover{background:#2a2a5a;}

.cases-panel{padding:4px 18px 10px 18px;background:inherit;}
.cases-toggle{background:none;border:none;font-size:11px;color:#4a6a8a;padding:2px 0;cursor:pointer;display:flex;align-items:center;gap:4px;letter-spacing:.05em;}
.cases-toggle:hover{color:#6a9aba;}
.cases-list{margin-top:6px;padding:8px 12px;background:#080816;border-radius:6px;border-left:2px solid #1e3a5a;}
.case-item{font-size:11px;color:#7a9aba;padding:2px 0;font-style:italic;}
.case-item::before{content:"⚖ ";font-style:normal;}
</style>
</head>
<body>
<div id="header">
  <div id="header-inner">
    <div id="header-top">
      <div>
        <div class="hlabel">SQE1 Assessment Specification</div>
        <h1>FLK2 Training Matrix</h1>
        <div class="hsub" id="hsub"></div>
      </div>
      <div>
        <div class="bigpct" id="overall-pct">0%</div>
        <div class="bigpct-lbl">Overall Confidence</div>
      </div>
    </div>
    <div id="pbars">
      <div>
        <div class="pb-lbl"><span>Confidence Progress</span><em id="cpct-lbl">0%</em></div>
        <div class="pb-track"><div class="pb-fill" id="cbar" style="width:0%;background:linear-gradient(90deg,#6366F1,#8B5CF6)"></div></div>
      </div>
      <div>
        <div class="pb-lbl"><span>Time Elapsed</span><em id="tlbl"></em></div>
        <div class="pb-track"><div class="pb-fill" id="tbar" style="width:0%;background:linear-gradient(90deg,#0EA5E9,#06B6D4)"></div></div>
      </div>
    </div>
    <div id="nav">
      <button class="nav-btn active" onclick="showView('dashboard')">Dashboard</button>
      <button class="nav-btn" onclick="showView('matrix')">Training Matrix</button>
    </div>
  </div>
</div>
<div id="main">
  <div id="vdash"></div>
  <div id="vmatrix" style="display:none"></div>
</div>
<div id="moverlay" onclick="if(event.target===this)closeModal()">
  <div id="mbox">
    <div class="mtlbl" id="mtlbl"></div>
    <div class="mtopic" id="mtopic"></div>
    <div class="fgrp">
      <label class="flbl">DATE COMPLETED</label>
      <input type="date" id="mdate" class="finput" min="2026-03-10" max="2026-07-10"/>
    </div>
    <div class="fgrp" id="mscore-grp" style="display:none">
      <label class="flbl">SCORE (optional, e.g. 7/10 or 70%)</label>
      <input type="text" id="mscore" class="finput" placeholder="e.g. 7/10 or 70%"/>
    </div>
    <div class="fgrpl">
      <label class="flbl">NOTES (optional)</label>
      <textarea id="mnote" class="finput" rows="2" style="resize:vertical"></textarea>
    </div>
    <div id="mprev"></div>
    <div class="mbtns">
      <button class="mok" id="mok" onclick="submitLog()">Log Session</button>
      <button class="mcancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

Condron [2000]","Murray v UK [1996]"],"clp_ev4":["R v Horncastle [2010]"],"clp_ev5":["R v Fulling [1987]","R v Paris, Abdullahi and Miller (1993)"],"clp_ev6":["R v Mason [1988]","R v Sang [1980]"],"clp_ev11":["R v Looseley [2001]"],"clp_tr2":["R v Galbraith [1981]"],"clp_tr5":["R v Barker [2010]"],"clp_se8":["R v Newton (1982)"]};
const ALL=SUBJECTS.flatMap(s=>s.sections.flatMap(sec=>sec.topics));
const TOTAL=ALL.length;
const CC=["#1a1a3a","#EF4444","#F97316","#F59E0B","#84CC16","#22C55E"];

let ST={};
try{ST=JSON.parse(localStorage.getItem("sqe_flk2_v3")||"{}");}catch{}
let VIEW="dashboard",SUBJ=SUBJECTS[0].id,OPENSEC={},OPENDET={},OPENCASES={},MID=null,MACT=null;

function save(){try{localStorage.setItem("sqe_flk2_v3",JSON.stringify(ST));}catch{}}
function td(id){return ST[id]||{confidence:0,activities:{}};}
function cc(p){return p>60?"#22C55E":p>30?"#F59E0B":p>0?"#EF4444":"#2a2a5a";}
function days(a,b){return Math.floor((b-a)/86400000);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function oConf(){const s=ALL.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0);return Math.round(s/(TOTAL*5)*100);}
function sConf(subj){const t=subj.sections.flatMap(s=>s.topics);const s=t.reduce((a,x)=>a+(ST[x.id]?.confidence||0),0);return Math.round(s/(t.length*5)*100);}
function secConf(sec){const s=sec.topics.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0);return Math.round(s/(sec.topics.length*5)*100);}
function totSess(){let c=0;Object.values(ST).forEach(d=>ACTS.forEach(a=>c+=(d.activities?.[a.key]||[]).length));return c;}
function topStart(){return ALL.filter(t=>ACTS.some(a=>(ST[t.id]?.activities?.[a.key]||[]).length>0)).length;}

function updateHeader(){
  const p=oConf();
  document.getElementById("overall-pct").textContent=p+"%";
  document.getElementById("overall-pct").style.color=cc(p);
  document.getElementById("cpct-lbl").textContent=p+"%";
  document.getElementById("cbar").style.width=p+"%";
  const now=new Date(),el=Math.max(0,days(SD,now)),tot=days(SD,ED),rem=Math.max(0,days(now,ED)),tp=Math.min(100,Math.round(el/tot*100));
  document.getElementById("tlbl").textContent=el+"/"+tot+" days ("+rem+" remaining)";
  document.getElementById("tbar").style.width=tp+"%";
  document.getElementById("hsub").textContent=SD.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" → "+ED.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" · "+TOTAL+" topic lines";
}

function showView(v){
  VIEW=v;
  document.querySelectorAll(".nav-btn").forEach(b=>{b.classList.toggle("active",b.textContent.toLowerCase()===v);});
  document.getElementById("vdash").style.display=v==="dashboard"?"":"none";
  document.getElementById("vmatrix").style.display=v==="matrix"?"":"none";
  if(v==="dashboard")renderDash();
  if(v==="matrix")renderMatrix();
}

function renderDash(){
  const p=oConf(),now=new Date(),rem=Math.max(0,days(now,ED)),el=Math.max(0,days(SD,now)),tot=days(SD,ED),tp=Math.min(100,Math.round(el/tot*100));
  const stats=[
    {label:"Overall Confidence",value:p+"%",sub:TOTAL+" topic lines",color:cc(p)},
    {label:"Topics Started",value:topStart(),sub:"of "+TOTAL,color:"#0EA5E9"},
    {label:"Sessions Logged",value:totSess(),sub:"across all activities",color:"#10B981"},
    {label:"Days Remaining",value:rem,sub:"of 122 total · "+tp+"% elapsed",color:"#F59E0B"},
  ];
  let h='<div class="stat-grid">';
  stats.forEach(s=>{h+=`<div class="stat-card"><div class="stat-lbl">${s.label}</div><div class="stat-val" style="color:${s.color}">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`;});
  h+='</div><div class="sec-title">Subject Confidence Overview</div><div class="subj-grid">';
  SUBJECTS.forEach(s=>{
    const sp=sConf(s),ts=s.sections.flatMap(x=>x.topics),done=ts.filter(t=>(ST[t.id]?.confidence||0)>0).length;
    h+=`<div class="subj-card" onclick="goSub('${s.id}')"><div class="subj-top"><div><div class="subj-name" style="color:${s.color}">${esc(s.name)}</div><div class="subj-s">${done} of ${ts.length} topics with confidence set</div></div><div class="subj-pct" style="color:${cc(sp)}">${sp}%</div></div><div class="pb-track"><div class="pb-fill" style="width:${sp}%;background:${s.color};opacity:.8"></div></div><div class="subj-hint">Click to open training matrix →</div></div>`;
  });
  h+='</div><div class="key-card"><div class="sec-title" style="margin-bottom:16px">Activity Key</div><div class="key-grid">';
  ACTS.forEach(a=>{h+=`<div class="key-item"><div class="key-icon" style="background:${a.color}22;border:1px solid ${a.color}44">${a.icon}</div><div><div class="key-name">${a.label}</div><div class="key-s">${a.key==="mcq"?"Log with date, score and notes":"Log a session with date and notes"}</div></div></div>`;});
  h+=`</div><div class="key-note">Confidence rated 0–5 per topic. Overall confidence = total scored ÷ (topics × 5) × 100%</div><div class="backup-row"><button class="exp-btn" onclick="exportData()">⬇ Export Progress</button><label class="imp-btn">⬆ Import Progress<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label></div></div>`;
  document.getElementById("vdash").innerHTML=h;
}

function goSub(id){SUBJ=id;showView("matrix");}

function renderMatrix(){
  const subj=SUBJECTS.find(s=>s.id===SUBJ)||SUBJECTS[0];
  const ts=subj.sections.flatMap(s=>s.topics),sp=Math.round(ts.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0)/(ts.length*5)*100);
  let h='<div id="stabs">';
  SUBJECTS.forEach(s=>{const ac=s.id===SUBJ;h+=`<button class="stab" style="${ac?`color:${s.color};border-color:${s.color};background:${s.color}22`:""}" onclick="switchSub('${s.id}')">${esc(s.name.split(" ").slice(0,3).join(" "))}</button>`;});
  h+=`</div><div id="mhdr"><div><div id="mtitle" style="color:${subj.color}">${esc(subj.name)}</div><div id="msub">${ts.length} topic lines · ${sp}% confident</div></div><div id="mpct" style="color:${cc(sp)}">${sp}%</div></div><div id="scon">`;
  subj.sections.forEach(sec=>{h+=renderSec(sec,subj.color);});
  h+='</div>';
  document.getElementById("vmatrix").innerHTML=h;
}

function renderSec(sec,color){
  const isO=OPENSEC[sec.id]!==false,sp=secConf(sec);
  let h=`<div class="secblock" id="sb-${sec.id}"><button class="sechdr${isO?" open":""}" onclick="togSec('${sec.id}')"><span>${esc(sec.name)}</span><div class="sechr"><span style="font-size:12px;color:${cc(sp)}">${sp}%</span><span style="color:#4a4a7a;font-size:16px">${isO?"▲":"▼"}</span></div></button>`;
  if(isO){h+='<div class="sectopics">';sec.topics.forEach((t,i)=>{h+=renderRow(t,i,sec.topics.length,color);});h+='</div>';}
  h+='</div>';return h;
}

function renderRow(t,idx,total,color){
  const d=td(t.id),conf=d.confidence||0,acts=d.activities||{},actC=ACTS.reduce((a,at)=>a+(acts[at.key]||[]).length,0),isD=OPENDET[t.id],bg=idx%2===0?"#0E0E22":"#0A0A1A";
  let cb='<div class="cgrp"><span class="clbl">Conf:</span>';
  for(let n=1;n<=5;n++){cb+=`<button class="cbtn" style="background:${conf>=n?CC[n]:"#1a1a3a"};opacity:${conf>=n?1:0.4}" onclick="setC('${t.id}',${n})">${n}</button>`;}
  cb+='</div>';
  let ab='<div class="agrp">';
  ACTS.forEach(at=>{const lg=(acts[at.key]||[]).length;ab+=`<button class="abtn" title="${at.label} (${lg})" style="border-color:${lg>0?at.color+"66":"#1a1a3a"};background:${lg>0?at.color+"22":"transparent"}" onclick="openM('${t.id}','${at.key}')">${at.icon}${lg>0?`<span class="abadge" style="background:${at.color}">${lg}</span>`:""}</button>`;});
  ab+='</div>';
  let det='';
  if(isD&&actC>0){
    det='<div class="tdetail">';
    ACTS.filter(at=>(acts[at.key]||[]).length>0).forEach(at=>{
      det+=`<div class="dlbl" style="color:${at.color}">${at.icon} ${at.label} sessions:</div>`;
      (acts[at.key]||[]).forEach((e,i)=>{det+=`<div class="dentry"><span>${esc(e.date)}${e.score?" · "+esc(e.score):""}${e.note?" – "+esc(e.note):""}</span><button class="ddel" onclick="delA('${t.id}','${at.key}',${i})">×</button></div>`;});
    });
    det+='</div>';
  }
    // cases panel
  const tc=CASES[t.id]||[];
  let cpanel='';
  if(tc.length>0){
    const isC=OPENCASES[t.id];
    cpanel=`<div class="cases-panel"><button class="cases-toggle" onclick="togCases('${t.id}')">${isC?'▾':'▸'} Key Cases (${tc.length})</button>`;
    if(isC){
      cpanel+='<div class="cases-list">';
      tc.forEach(cs=>{cpanel+=`<div class="case-item">${esc(cs)}</div>`;});
      cpanel+='</div>';
    }
    cpanel+='</div>';
  }
  return `<div class="trow" id="row-${t.id}" style="background:${bg}${idx<total-1?";border-bottom:1px solid #1a1a3a":""}"><div class="trow-main"><div class="ttext" onclick="togDet('${t.id}')">${esc(t.text)}</div>${cb}${ab}</div>${det}${cpanel}</div>`;
}

function setC(id,v){const d=td(id);d.confidence=(d.confidence===v)?0:v;ST[id]=d;save();rerenderRow(id);updateHeader();if(VIEW==="dashboard")renderDash();}
function delA(id,key,i){const d=td(id);d.activities[key].splice(i,1);ST[id]=d;save();rerenderRow(id);if(VIEW==="dashboard")renderDash();}
function togSec(id){OPENSEC[id]=OPENSEC[id]===false;const subj=SUBJECTS.find(s=>s.sections.some(sec=>sec.id===id));const sec=subj?.sections.find(sec=>sec.id===id);if(!sec)return;const el=document.getElementById("sb-"+id);if(el)el.outerHTML=renderSec(sec,subj.color);}
function togDet(id){OPENDET[id]=!OPENDET[id];rerenderRow(id);}
function switchSub(id){SUBJ=id;renderMatrix();}
function togCases(id){OPENCASES[id]=!OPENCASES[id];rerenderRow(id);}

function rerenderRow(id){
  const el=document.getElementById("row-"+id);if(!el)return;
  const subj=SUBJECTS.find(s=>s.sections.some(sec=>sec.topics.some(t=>t.id===id)));
  const sec=subj?.sections.find(sec=>sec.topics.some(t=>t.id===id));if(!sec)return;
  const t=sec.topics.find(t=>t.id===id),i=sec.topics.indexOf(t);
  el.outerHTML=renderRow(t,i,sec.topics.length,subj.color);
  const sb=document.getElementById("sb-"+sec.id);
  if(sb){const sp=secConf(sec);const pEl=sb.querySelector(".sechr span");if(pEl){pEl.textContent=sp+"%";pEl.style.color=cc(sp);}}
  const mp=document.getElementById("mpct"),ms=document.getElementById("msub");
  if(mp&&ms){const subj2=SUBJECTS.find(s=>s.id===SUBJ);if(subj2){const ts=subj2.sections.flatMap(s=>s.topics),sp2=Math.round(ts.reduce((a,t2)=>a+(ST[t2.id]?.confidence||0),0)/(ts.length*5)*100);mp.textContent=sp2+"%";mp.style.color=cc(sp2);ms.textContent=ts.length+" topic lines · "+sp2+"% confident";}}
}

function openM(topicId,actKey){
  MID=topicId;MACT=actKey;
  const act=ACTS.find(a=>a.key===actKey),topic=ALL.find(t=>t.id===topicId);
  document.getElementById("mtlbl").textContent=act.icon+" Log "+act.label+" Session";
  document.getElementById("mtlbl").style.color=act.color;
  document.getElementById("mtopic").textContent=topic.text;
  document.getElementById("mdate").value=todayStr();
  document.getElementById("mscore").value="";
  document.getElementById("mnote").value="";
  document.getElementById("mscore-grp").style.display=actKey==="mcq"?"":"none";
  document.getElementById("mnote").placeholder=actKey==="mcq"?"e.g. Kaplan practice set, weak on mens rea...":"e.g. Listened to lecture, completed flashcards...";
  document.getElementById("mok").style.background=act.color;
  renderPrev();
  document.getElementById("moverlay").classList.add("show");
}

function renderPrev(){
  const d=td(MID),ex=d.activities?.[MACT]||[];
  if(!ex.length){document.getElementById("mprev").innerHTML="";return;}
  let h='<div class="prevlbl">PREVIOUS SESSIONS</div>';
  ex.forEach((e,i)=>{h+=`<div class="prevrow"><span>${esc(e.date)}${e.score?" · "+esc(e.score):""}${e.note?" – "+esc(e.note):""}</span><button class="prevdel" onclick="delAModal(${i})">×</button></div>`;});
  document.getElementById("mprev").innerHTML=h;
}

function delAModal(i){const d=td(MID);d.activities[MACT].splice(i,1);ST[MID]=d;save();rerenderRow(MID);renderPrev();if(VIEW==="dashboard")renderDash();}
function submitLog(){const date=document.getElementById("mdate").value;if(!date)return;const note=document.getElementById("mnote").value.trim(),score=document.getElementById("mscore").value.trim();const d=td(MID);if(!d.activities[MACT])d.activities[MACT]=[];d.activities[MACT].push({date,note,score});ST[MID]=d;save();rerenderRow(MID);closeModal();if(VIEW==="dashboard")renderDash();}
function closeModal(){document.getElementById("moverlay").classList.remove("show");MID=null;MACT=null;}


function exportData(){
  const blob=new Blob([JSON.stringify(ST,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="sqe_flk2_progress_"+todayStr()+".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const imported=JSON.parse(ev.target.result);
      if(typeof imported!=="object"||Array.isArray(imported))throw new Error("Invalid");
      ST=imported;save();updateHeader();
      if(VIEW==="dashboard")renderDash();else renderMatrix();
      alert("Progress imported successfully!");
    }catch{alert("Could not read file. Make sure it is a valid export from this app.");}
  };
  reader.readAsText(file);
  e.target.value="";
}
updateHeader();renderDash();
</script>
