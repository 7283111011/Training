<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLK2 Training Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F5F7;
  --bg2:#FFFFFF;
  --bg3:#F5F5F7;
  --surface:rgba(255,255,255,0.8);
  --surface2:rgba(255,255,255,0.6);
  --border:rgba(0,0,0,0.08);
  --border2:rgba(0,0,0,0.05);
  --text:#1D1D1F;
  --text2:#6E6E73;
  --text3:#AEAEB2;
  --accent:#007AFF;
  --accent2:#5856D6;
  --green:#34C759;
  --orange:#FF9500;
  --red:#FF3B30;
  --yellow:#FFCC00;
  --pink:#FF2D55;
  --teal:#5AC8FA;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 2px 20px rgba(0,0,0,0.07);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
}
body{
  background:#F5F5F7;
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* Apple Intelligence mesh gradient background */
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(120,160,255,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 5%, rgba(200,130,255,0.13) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 0%, rgba(100,220,255,0.10) 0%, transparent 50%),
    radial-gradient(ellipse 70% 55% at 0% 50%, rgba(90,200,180,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 60% 45% at 100% 60%, rgba(255,140,180,0.09) 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 30% 100%, rgba(160,130,255,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(100,200,255,0.09) 0%, transparent 55%),
    #F2F2F7;
  animation:meshShift 18s ease-in-out infinite alternate;
}
@keyframes meshShift{
  0%  {background-position:0% 0%,100% 0%,50% 0%,0% 50%,100% 60%,30% 100%,80% 100%;}
  50% {background-position:5% 3%,95% 8%,55% 5%,3% 48%,97% 55%,33% 97%,77% 103%;}
  100%{background-position:2% 6%,98% 4%,48% 8%,6% 52%,94% 62%,28% 103%,82% 97%;}
}
#header,#main{position:relative;z-index:1;}
button{font-family:inherit;cursor:pointer;}
input,textarea{font-family:inherit;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:10px;}
input[type=date]::-webkit-calendar-picker-indicator{opacity:0.4;}

/* HEADER */
#header{
  background:rgba(242,242,247,0.75);
  backdrop-filter:blur(28px) saturate(200%);
  -webkit-backdrop-filter:blur(28px) saturate(200%);
  border-bottom:1px solid rgba(255,255,255,0.6);
  position:sticky;
  top:0;
  z-index:100;
  /* subtle rainbow shimmer on header bottom edge */
  box-shadow:
    0 1px 0 rgba(255,255,255,0.8),
    0 2px 20px rgba(100,140,255,0.06);
}
#header-inner{max-width:1100px;margin:0 auto;padding:0 20px;}
#header-top{padding:22px 0 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
.hlabel{
  font-size:10px;
  font-weight:600;
  letter-spacing:.1em;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:5px;
}
h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px;line-height:1.2;}
.hsub{font-size:12px;color:var(--text2);margin-top:3px;font-weight:400;}
.bigpct{font-size:34px;font-weight:700;text-align:right;letter-spacing:-1px;}
.bigpct-lbl{font-size:10px;color:var(--text2);text-align:right;font-weight:500;letter-spacing:.04em;text-transform:uppercase;}

/* Apple Intelligence shimmer bar — sits just above the nav */
#ai-bar{
  height:2px;
  width:100%;
  background:linear-gradient(90deg,
    #5AC8FA 0%,
    #007AFF 20%,
    #AF52DE 40%,
    #FF2D55 60%,
    #FF9500 80%,
    #5AC8FA 100%
  );
  background-size:200% 100%;
  animation:shimmerBar 4s linear infinite;
  opacity:0.7;
}
@keyframes shimmerBar{
  0%{background-position:0% 0%;}
  100%{background-position:200% 0%;}
}
#pbars{display:grid;grid-template-columns:1fr;gap:8px;padding:12px 0 16px;}
.pb-lbl{display:flex;justify-content:space-between;margin-bottom:5px;}
.pb-lbl span{font-size:11px;color:var(--text2);font-weight:500;}
.pb-lbl em{font-size:11px;color:var(--text2);font-style:normal;font-weight:400;}
.pb-track{height:4px;background:rgba(0,0,0,0.08);border-radius:2px;overflow:hidden;}
.pb-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* NAV */
#nav{display:flex;border-top:1px solid var(--border2);gap:0;}
.nav-btn{
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  color:var(--text2);
  padding:10px 20px;
  font-size:13px;
  font-weight:500;
  letter-spacing:-.01em;
  transition:all .2s;
}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-btn:hover{color:var(--text);}

/* MAIN */
#main{max-width:1100px;margin:0 auto;padding:24px 20px;}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.stat-card{
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid rgba(255,255,255,0.85);
  border-radius:var(--radius);
  padding:18px 20px;
  box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s;
}
.stat-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg);}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.stat-val{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.5px;}
.stat-sub{font-size:11px;color:var(--text3);margin-top:5px;font-weight:400;}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}

/* SUBJECT CARDS */
.subj-grid{display:grid;grid-template-columns:1fr;gap:10px;}
.subj-card{
  background:rgba(255,255,255,0.68);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid rgba(255,255,255,0.82);
  border-radius:var(--radius);
  padding:18px 20px;
  cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--shadow);
}
.subj-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:rgba(255,255,255,0.95);}
.subj-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.subj-name{font-size:14px;font-weight:600;margin-bottom:2px;letter-spacing:-.2px;}
.subj-s{font-size:11px;color:var(--text3);font-weight:400;}
.subj-pct{font-size:30px;font-weight:700;letter-spacing:-1px;}
.subj-hint{margin-top:10px;font-size:11px;color:var(--text3);font-weight:400;}

/* KEY CARD */
.key-card{
  background:rgba(255,255,255,0.68);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid rgba(255,255,255,0.82);
  border-radius:var(--radius);
  padding:18px 20px;
  margin-top:20px;
  box-shadow:var(--shadow);
}
.key-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.key-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--radius-sm);background:var(--bg3);}
.key-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.key-name{font-size:12px;font-weight:600;color:var(--text);}
.key-s{font-size:10px;color:var(--text3);}
.key-note{margin-top:14px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);padding-top:12px;}

/* SUBJECT TABS */
#stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.stab{
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--bg2);
  color:var(--text2);
  padding:6px 14px;
  font-size:12px;
  font-weight:500;
  transition:all .2s;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.stab:hover{border-color:rgba(0,122,255,0.3);color:var(--text);}

/* MATRIX HEADER */
#mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
#mtitle{font-size:22px;font-weight:700;letter-spacing:-.5px;}
#msub{font-size:12px;color:var(--text2);margin-top:3px;}
#mpct{font-size:30px;font-weight:700;letter-spacing:-1px;}

/* SECTION BLOCKS */
.secblock{margin-bottom:8px;}
.sechdr{
  width:100%;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.85);
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-align:left;
  color:var(--text);
  font-size:13px;
  font-weight:600;
  border-radius:var(--radius-sm);
  box-shadow:0 1px 6px rgba(0,0,0,0.05);
  transition:all .15s;
  letter-spacing:-.1px;
}
.sechdr:hover{background:rgba(255,255,255,0.88);}
.sechdr.open{border-radius:var(--radius-sm) var(--radius-sm) 0 0;border-bottom-color:var(--border2);}
.sechr{display:flex;gap:10px;align-items:center;}
.sec-pct-pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--bg3);}
.sectopics{
  border:1px solid rgba(255,255,255,0.75);
  border-top:none;
  border-radius:0 0 var(--radius-sm) var(--radius-sm);
  overflow:hidden;
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

/* TOPIC ROWS */
.trow{border-bottom:1px solid var(--border2);}
.trow:last-child{border-bottom:none;}
.trow-main{padding:12px 18px;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.ttext{
  flex:1;
  min-width:200px;
  font-size:13px;
  color:var(--text);
  line-height:1.5;
  padding-top:3px;
  cursor:pointer;
  font-weight:400;
}
.ttext:hover{color:var(--accent);}

/* CONFIDENCE BUTTONS */
.cgrp{display:flex;gap:2px;align-items:center;flex-shrink:0;}
.clbl{font-size:10px;color:var(--text3);margin-right:5px;white-space:nowrap;font-weight:500;letter-spacing:.04em;}
.cbtn{
  width:24px;
  height:24px;
  border-radius:6px;
  border:none;
  font-size:10px;
  font-weight:700;
  transition:all .15s;
}
.cbtn:hover{transform:scale(1.1);}

/* ACTIVITY BUTTONS */
.agrp{display:flex;gap:4px;flex-shrink:0;}
.abtn{
  width:30px;
  height:30px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg3);
  font-size:13px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .15s;
}
.abtn:hover{transform:scale(1.08);border-color:rgba(0,122,255,0.3);}
.abadge{
  position:absolute;
  top:-5px;
  right:-5px;
  border-radius:50%;
  width:14px;
  height:14px;
  font-size:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#fff;
}

/* DETAIL PANEL */
.tdetail{padding:0 18px 12px;background:var(--bg3);}
.dlbl{font-size:10px;font-weight:600;margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;}
.dentry{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  color:var(--text2);
  padding:4px 10px;
  background:var(--bg2);
  border-radius:7px;
  margin-bottom:3px;
  border:1px solid var(--border2);
}
.ddel{background:none;border:none;color:var(--red);font-size:14px;padding:0 2px;opacity:.6;transition:opacity .15s;}
.ddel:hover{opacity:1;}

/* MODAL */
#moverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:1000;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#moverlay.show{display:flex;}
#mbox{
  background:rgba(250,250,253,0.88);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:20px;
  padding:28px;
  width:100%;
  max-width:480px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,0.15),0 0 0 0.5px rgba(255,255,255,0.5) inset;
  animation:modalIn .25s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mtlbl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.mtopic{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:20px;font-weight:400;}
.flbl{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px;}
.finput{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  padding:10px 12px;
  font-size:14px;
  font-family:inherit;
  transition:border-color .15s;
  outline:none;
}
.finput:focus{border-color:var(--accent);background:#fff;}
.fgrp{margin-bottom:14px;}
.fgrpl{margin-bottom:18px;}
.prevlbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.prevrow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  color:var(--text2);
  padding:6px 0;
  border-bottom:1px solid var(--border2);
}
.prevdel{background:none;border:none;color:var(--red);font-size:15px;padding:0 4px;opacity:.6;transition:opacity .15s;}
.prevdel:hover{opacity:1;}
.mbtns{display:flex;gap:10px;margin-top:20px;}
.mok{
  flex:1;
  border:none;
  border-radius:12px;
  color:#fff;
  padding:12px;
  font-size:14px;
  font-weight:600;
  font-family:inherit;
  transition:opacity .15s,transform .1s;
}
.mok:hover{opacity:.9;}
.mok:active{transform:scale(.98);}
.mcancel{
  flex:1;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text2);
  padding:12px;
  font-size:14px;
  font-weight:500;
  font-family:inherit;
  transition:all .15s;
}
.mcancel:hover{background:var(--border);color:var(--text);}

/* BACKUP ROW */
.backup-row{
  display:flex;
  gap:8px;
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid var(--border);
  flex-wrap:wrap;
}
.exp-btn{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text2);
  padding:9px 14px;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  flex:1;
  min-width:120px;
  transition:all .15s;
}
.exp-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.imp-btn{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text2);
  padding:9px 14px;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  flex:1;
  min-width:120px;
  text-align:center;
  display:block;
  transition:all .15s;
}
.imp-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

/* CASES PANEL */
.cases-panel{padding:4px 18px 10px;}
.cases-toggle{
  background:none;
  border:none;
  font-size:11px;
  color:var(--text3);
  padding:3px 0;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:4px;
  font-weight:500;
  transition:color .15s;
}
.cases-toggle:hover{color:var(--accent);}
.cases-list{
  margin-top:6px;
  padding:10px 14px;
  background:rgba(0,122,255,0.04);
  border-radius:8px;
  border-left:2px solid var(--accent);
}
.case-item{
  font-size:11px;
  color:var(--text2);
  padding:2px 0;
  font-style:italic;
}
.case-item::before{content:"⚖ ";font-style:normal;opacity:.5;}

/* CHEVRON */
.chev{
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  color:var(--text3);
  flex-shrink:0;
}

/* DANGER BTN */
.danger-btn{
  background:rgba(255,59,48,0.06);
  border:1px solid rgba(255,59,48,0.2);
  border-radius:10px;
  color:var(--red);
  padding:9px 14px;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  flex:1;
  min-width:120px;
  transition:all .15s;
}
.danger-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* GH BTN */
.gh-btn-connected{
  background:rgba(52,199,89,0.08);
  border:1px solid rgba(52,199,89,0.25);
  border-radius:10px;
  color:#1a7a35;
  padding:9px 14px;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  flex:1;
  min-width:120px;
  transition:all .15s;
}
.gh-btn-connected:hover{background:rgba(52,199,89,0.15);}
.gh-btn-disconnected{
  background:rgba(255,149,0,0.07);
  border:1px solid rgba(255,149,0,0.25);
  border-radius:10px;
  color:#7a4f00;
  padding:9px 14px;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  flex:1;
  min-width:120px;
  transition:all .15s;
}
.gh-btn-disconnected:hover{background:rgba(255,149,0,0.15);}

/* RESPONSIVE */
@media(max-width:600px){
  .trow-main{flex-wrap:wrap;}
  .ttext{min-width:100%;order:1;}
  .cgrp,.agrp{order:2;flex-shrink:0;}
}
@media(min-width:640px){
  #main{padding:28px 32px;}
  .stat-grid{grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
  .stat-val{font-size:32px;}
  .subj-grid{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;}
  #pbars{grid-template-columns:1fr 1fr;gap:14px;padding:14px 0 18px;}
  h1{font-size:24px;}
  .bigpct{font-size:38px;}
  #header{padding:0;}
  #header-inner{padding:0 32px;}
}
</style>
</head>
<body>
<div id="header">
  <div id="header-inner">
    <div id="header-top">
      <div>
        <div class="hlabel">SQE1 Assessment Specification</div>
        <h1>FLK2 Training Matrix</h1>
        <div class="hsub" id="hsub"></div>
      </div>
      <div>
        <div class="bigpct" id="overall-pct">0%</div>
        <div class="bigpct-lbl">Overall Confidence</div>
      </div>
    </div>
    <div id="pbars">
      <div>
        <div class="pb-lbl"><span>Confidence</span><em id="cpct-lbl">0%</em></div>
        <div class="pb-track"><div class="pb-fill" id="cbar" style="width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div>
      </div>
      <div>
        <div class="pb-lbl"><span>Time Elapsed</span><em id="tlbl"></em></div>
        <div class="pb-track"><div class="pb-fill" id="tbar" style="width:0%;background:linear-gradient(90deg,var(--teal),var(--accent))"></div></div>
      </div>
    </div>

function save(){try{localStorage.setItem("sqe_flk2_v3",JSON.stringify(ST));}catch{}if(GHTOKEN&&GHGISTID)syncToGitHub();}

function syncFromGitHub(){if(!GHTOKEN||!GHGISTID){alert("GitHub not connected.");return;}fetch("https://api.github.com/gists/"+GHGISTID,{method:"GET",headers:{"Authorization":"token "+GHTOKEN}}).then(r=>r.json()).then(data=>{const file=data.files?.["sqe_flk2_progress.json"];if(file?.content){try{ST=JSON.parse(file.content);save();updateHeader();if(VIEW==="dashboard")renderDash();else renderMatrix();alert("✓ Synced from GitHub!");}catch{alert("Error reading GitHub data");}}else{alert("No progress file found on GitHub");}}).catch(e=>{alert("Failed to sync from GitHub.");console.log(e);});}

function createNewGist(token){fetch("https://api.github.com/gists",{method:"POST",headers:{"Authorization":"token "+token,"Content-Type":"application/json"},body:JSON.stringify({description:"SQE FLK2 Training Matrix Progress",public:false,files:{"sqe_flk2_progress.json":{content:JSON.stringify(ST)}}})}).then(r=>r.json()).then(data=>{if(data.id){GHGISTID=data.id;localStorage.setItem("sqe_gh_gistid",data.id);alert("✓ New Gist created! ID: "+data.id);}else{alert("Failed to create Gist.");}}).catch(e=>{alert("Failed to create Gist");console.log(e);});}
function clearGithub(){if(confirm("Disconnect GitHub? (Local data preserved)")){GHTOKEN=null;GHGISTID=null;localStorage.removeItem("sqe_gh_token");localStorage.removeItem("sqe_gh_gistid");if(VIEW==="dashboard")renderDash();alert("✓ GitHub disconnected");}}
function td(id){return ST[id]||{confidence:0,activities:{}};}
function cc(p){return p>60?"#34C759":p>30?"#FF9500":p>0?"#FF3B30":"#AEAEB2";}
function days(a,b){return Math.floor((b-a)/86400000);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function oConf(){const s=ALL.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0);return Math.round(s/(TOTAL*5)*100);}
function sConf(subj){const t=subj.sections.flatMap(s=>s.topics);const s=t.reduce((a,x)=>a+(ST[x.id]?.confidence||0),0);return Math.round(s/(t.length*5)*100);}
function secConf(sec){const s=sec.topics.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0);return Math.round(s/(sec.topics.length*5)*100);}
function totSess(){let c=0;Object.values(ST).forEach(d=>ACTS.forEach(a=>c+=(d.activities?.[a.key]||[]).length));return c;}
function topStart(){return ALL.filter(t=>ACTS.some(a=>(ST[t.id]?.activities?.[a.key]||[]).length>0)).length;}

function updateHeader(){
  const p=oConf();
  document.getElementById("overall-pct").textContent=p+"%";
  document.getElementById("overall-pct").style.color=cc(p);

  const now=new Date(),el=Math.max(0,days(SD,now)),tot=days(SD,ED),rem=Math.max(0,days(now,ED)),tp=Math.min(100,Math.round(el/tot*100));

}

function goSub(id){SUBJ=id;showView("matrix");}

function renderMatrix(){
  const subj=SUBJECTS.find(s=>s.id===SUBJ)||SUBJECTS[0];
  const ts=subj.sections.flatMap(s=>s.topics),sp=Math.round(ts.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0)/(ts.length*5)*100);
  let h='<div id="stabs">';
  SUBJECTS.forEach(s=>{const ac=s.id===SUBJ;h+=`<button class="stab" style="${ac?`color:${s.color};border-color:${s.color}33;background:${s.color}12;font-weight:600`:""}" onclick="switchSub('${s.id}')">${esc(s.name.split(" ").slice(0,3).join(" "))}</button>`;});
  h+=`</div><div id="mhdr"><div><div id="mtitle" style="color:${subj.color}">${esc(subj.name)}</div><div id="msub">${ts.length} topic lines · ${sp}% confident</div></div><div id="mpct" style="color:${cc(sp)}">${sp}%</div></div><div id="scon">`;
  subj.sections.forEach(sec=>{h+=renderSec(sec,subj.color);});
  h+='</div>';
  document.getElementById("vmatrix").innerHTML=h;
}

function renderSec(sec,color){
  const isO=OPENSEC[sec.id]!==false,sp=secConf(sec);
  let h=`<div class="secblock" id="sb-${sec.id}"><button class="sechdr${isO?" open":""}" onclick="togSec('${sec.id}')"><span>${esc(sec.name)}</span><div class="sechr"><span class="sec-pct-pill" style="color:${cc(sp)}">${sp}%</span><span class="chev">${isO?"▲":"▼"}</span></div></button>`;
  if(isO){h+='<div class="sectopics">';sec.topics.forEach((t,i)=>{h+=renderRow(t,i,sec.topics.length,color);});h+='</div>';}
  h+='</div>';return h;
}

function renderRow(t,idx,total,color){
  const d=td(t.id),conf=d.confidence||0,acts=d.activities||{},actC=ACTS.reduce((a,at)=>a+(acts[at.key]||[]).length,0),isD=OPENDET[t.id],bg=idx%2===0?"#FFFFFF":"#FAFAFA";
  let cb='<div class="cgrp"><span class="clbl">Conf</span>';
  for(let n=1;n<=5;n++){cb+=`<button class="cbtn" style="background:${conf>=n?CC[n]:CC[0]};color:${conf>=n?"#fff":"#AEAEB2"}" onclick="setC('${t.id}',${n})">${n}</button>`;}
  cb+='</div>';
  let ab='<div class="agrp">';
  ACTS.forEach(at=>{const lg=(acts[at.key]||[]).length;ab+=`<button class="abtn" title="${at.label} (${lg})" style="${lg>0?`border-color:${at.color}55;background:${at.color}12`:""}" onclick="openM('${t.id}','${at.key}')">${at.icon}${lg>0?`<span class="abadge" style="background:${at.color}">${lg}</span>`:""}</button>`;});
  ab+='</div>';
  let det='';
  if(isD&&actC>0){
    det='<div class="tdetail">';
    ACTS.filter(at=>(acts[at.key]||[]).length>0).forEach(at=>{
      det+=`<div class="dlbl" style="color:${at.color};margin-top:8px">${at.icon} ${at.label}</div>`;
      (acts[at.key]||[]).forEach((e,i)=>{det+=`<div class="dentry"><span>${esc(e.date)}${e.score?" · "+esc(e.score):""}${e.note?" · "+esc(e.note):""}</span><button class="ddel" onclick="delA('${t.id}','${at.key}',${i})">×</button></div>`;});
    });
    det+='</div>';
  }
  const tc=CASES[t.id]||[];
  let cpanel='';
  if(tc.length>0){
    const isC=OPENCASES[t.id];
    cpanel=`<div class="cases-panel"><button class="cases-toggle" onclick="togCases('${t.id}')">${isC?"▾":"▸"} Key Cases (${tc.length})</button>`;
    if(isC){cpanel+='<div class="cases-list">';tc.forEach(cs=>{cpanel+=`<div class="case-item">${esc(cs)}</div>`;});cpanel+='</div>';}
    cpanel+='</div>';
  }
  return `<div class="trow" id="row-${t.id}" style="background:${bg}"><div class="trow-main"><div class="ttext" onclick="togDet('${t.id}')">${esc(t.text)}</div>${cb}${ab}</div>${det}${cpanel}</div>`;
}

function setC(id,v){const d=td(id);d.confidence=(d.confidence===v)?0:v;ST[id]=d;save();rerenderRow(id);updateHeader();if(VIEW==="dashboard")renderDash();}
function delA(id,key,i){const d=td(id);d.activities[key].splice(i,1);ST[id]=d;save();rerenderRow(id);if(VIEW==="dashboard")renderDash();}
function togSec(id){OPENSEC[id]=OPENSEC[id]===false;const subj=SUBJECTS.find(s=>s.sections.some(sec=>sec.id===id));const sec=subj?.sections.find(sec=>sec.id===id);if(!sec)return;const el=document.getElementById("sb-"+id);if(el)el.outerHTML=renderSec(sec,subj.color);}
function togDet(id){OPENDET[id]=!OPENDET[id];rerenderRow(id);}
function switchSub(id){SUBJ=id;renderMatrix();}
function togCases(id){OPENCASES[id]=!OPENCASES[id];rerenderRow(id);}

function rerenderRow(id){
  const el=document.getElementById("row-"+id);if(!el)return;
  const subj=SUBJECTS.find(s=>s.sections.some(sec=>sec.topics.some(t=>t.id===id)));
  const sec=subj?.sections.find(sec=>sec.topics.some(t=>t.id===id));if(!sec)return;
  const t=sec.topics.find(t=>t.id===id),i=sec.topics.indexOf(t);
  el.outerHTML=renderRow(t,i,sec.topics.length,subj.color);
  const sb=document.getElementById("sb-"+sec.id);
  if(sb){const sp=secConf(sec);const pEl=sb.querySelector(".sec-pct-pill");if(pEl){pEl.textContent=sp+"%";pEl.style.color=cc(sp);}}
  const mp=document.getElementById("mpct"),ms=document.getElementById("msub");
  if(mp&&ms){const subj2=SUBJECTS.find(s=>s.id===SUBJ);if(subj2){const ts=subj2.sections.flatMap(s=>s.topics),sp2=Math.round(ts.reduce((a,t2)=>a+(ST[t2.id]?.confidence||0),0)/(ts.length*5)*100);mp.textContent=sp2+"%";mp.style.color=cc(sp2);ms.textContent=ts.length+" topic lines · "+sp2+"% confident";}}
}

function openM(topicId,actKey){
  MID=topicId;MACT=actKey;
  const act=ACTS.find(a=>a.key===actKey),topic=ALL.find(t=>t.id===topicId);
  document.getElementById("mtlbl").textContent=act.icon+" Log "+act.label+" Session";
  document.getElementById("mtlbl").style.color=act.color;
  document.getElementById("mtopic").textContent=topic.text;
  document.getElementById("mdate").value=todayStr();
  document.getElementById("mscore").value="";
  document.getElementById("mnote").value="";
  document.getElementById("mscore-grp").style.display=actKey==="mcq"?"":"none";
  document.getElementById("mnote").placeholder=actKey==="mcq"?"e.g. Kaplan practice set, weak on mens rea...":"e.g. Listened to lecture, completed flashcards...";
  document.getElementById("mok").style.background=act.color;
  renderPrev();
  document.getElementById("moverlay").classList.add("show");
}
function renderPrev(){
  const d=td(MID),ex=d.activities?.[MACT]||[];
  if(!ex.length){document.getElementById("mprev").innerHTML="";return;}
  let h='<div class="prevlbl" style="margin-bottom:8px">Previous Sessions</div>';
  ex.forEach((e,i)=>{h+=`<div class="prevrow"><span>${esc(e.date)}${e.score?" · "+esc(e.score):""}${e.note?" · "+esc(e.note):""}</span><button class="prevdel" onclick="delAModal(${i})">×</button></div>`;});
  document.getElementById("mprev").innerHTML=h;
}
function delAModal(i){const d=td(MID);d.activities[MACT].splice(i,1);ST[MID]=d;save();rerenderRow(MID);renderPrev();if(VIEW==="dashboard")renderDash();}
function submitLog(){const date=document.getElementById("mdate").value;if(!date)return;const note=document.getElementById("mnote").value.trim(),score=document.getElementById("mscore").value.trim();const d=td(MID);if(!d.activities[MACT])d.activities[MACT]=[];d.activities[MACT].push({date,note,score});ST[MID]=d;save();rerenderRow(MID);closeModal();if(VIEW==="dashboard")renderDash();}
function closeModal(){document.getElementById("moverlay").classList.remove("show");MID=null;MACT=null;}
function exportData(){const blob=new Blob([JSON.stringify(ST,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="sqe_flk2_progress_"+todayStr()+".json";a.click();URL.revokeObjectURL(a.href);}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){try{const imported=JSON.parse(ev.target.result);if(typeof imported!=="object"||Array.isArray(imported))throw new Error();ST=imported;save();updateHeader();if(VIEW==="dashboard")renderDash();else renderMatrix();alert("Progress imported!");}catch{alert("Could not read file.");}};reader.readAsText(file);e.target.value="";}
function resetAll(){if(confirm("This will permanently delete all progress. Are you sure?")){if(confirm("Cannot be undone. Confirm reset.")){ST={};save();updateHeader();if(VIEW==="dashboard")renderDash();else renderMatrix();alert("✓ Reset complete.");}}}
function loadGitHubOnStart(){if(GHTOKEN&&GHGISTID){fetch("https://api.github.com/gists/"+GHGISTID,{method:"GET",headers:{"Authorization":"token "+GHTOKEN}}).then(r=>r.json()).then(data=>{const file=data.files?.["sqe_flk2_progress.json"];if(file?.content){try{ST=JSON.parse(file.content);save();}catch{}}}).catch(e=>console.log("GitHub load skipped"));}}

updateHeader();loadGitHubOnStart();renderDash();
</script>
</body>
