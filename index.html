"clp_ap2":{title:"Powers of the Crown Court on Appeal from Magistrates'",url:"https://www.legislation.gov.uk/ukpga/1981/54/section/79",body:`<p>On appeal from the magistrates' court, the Crown Court may:</p><ul><li><strong>Confirm</strong> the decision.</li><li><strong>Vary</strong> the decision — including imposing a harsher sentence (up to the maximum the magistrates could have imposed).</li><li><strong>Quash</strong> the decision.</li><li><strong>Remit</strong> the case back to the magistrates.</li><li>The appeal is a complete <em>de novo</em> rehearing — not merely a review of the lower court's decision. Both parties may call any evidence.</li></ul>`},
"clp_ap3":{title:"Appeal by Way of Case Stated — Criminal Procedure Rules Part 35",url:"https://www.legislation.gov.uk/ukpga/1980/43/section/111",body:`<p>Available to both prosecution and defence against decisions of the magistrates' court or the Crown Court (on appeal from magistrates').</p><ul><li><strong>Grounds:</strong> The decision was wrong in law, or was made in excess of jurisdiction. Not available to challenge findings of fact.</li><li><strong>Procedure:</strong> Application must be made within <strong>21 days</strong> of the decision. The lower court states a case setting out facts found and the question of law. The case is then referred to the <strong>Divisional Court (King's Bench Division)</strong> for determination.</li><li>Cannot be used if the defendant has already appealed to the Crown Court against the same decision.</li></ul>`},
"clp_ap4":{title:"Appeals from Crown Court — Grounds of Appeal",url:"https://www.legislation.gov.uk/ukpga/1968/19/section/2",body:`<p>A defendant may appeal from the Crown Court to the <strong>Court of Appeal (Criminal Division)</strong> against conviction or sentence.</p><ul><li><strong>Against conviction:</strong> Only where the defendant pleaded not guilty at trial. The conviction may be appealed if it is <em>"unsafe"</em> under s.2(1)(a) Criminal Appeal Act 1968. Judges ask whether they have any reasonable or lingering doubt about the conviction (<em>Stafford v DPP [1974]</em>).</li><li><strong>Sentence appeal grounds:</strong> Wrong in law (sentence imposed could not legally be passed); wrong in principle (judge misapplied established sentencing principles); or <em>manifestly excessive</em> (clearly too severe given the circumstances).</li><li>The Court of Appeal primarily hears legal arguments but can, in exceptional cases, admit new evidence not presented at trial.</li><li>The Court of Appeal cannot increase a sentence beyond the Crown Court's original powers.</li></ul>`},
"clp_ap5":{title:"Appeals from Crown Court — Procedure",url:"https://www.legislation.gov.uk/ukpga/1968/19/contents",body:`<p>Procedure for appealing from the Crown Court to the Court of Appeal:</p><ul><li><strong>Leave required:</strong> From either the trial judge or the Court of Appeal itself.</li><li><strong>Application:</strong> Must be lodged within <strong>28 days</strong> of conviction or sentence, with draft grounds of appeal.</li><li>Appeals are usually heard by a panel of <strong>three judges</strong> (Lord/Lady Justice of Appeal plus High Court or senior judges).</li><li><strong>Prosecution appeal — unduly lenient sentences:</strong> The Attorney-General may refer a Crown Court sentence to the Court of Appeal within <strong>28 days</strong> under s.36 Criminal Justice Act 1988. A sentence is unduly lenient if it falls outside the reasonable sentencing range the judge could have considered appropriate.</li><li><strong>Prosecution appeal — terminating rulings:</strong> Prosecution may appeal rulings (e.g. stay of proceedings, no case to answer) up to the start of the judge's summing up.</li></ul>`},
"clp_ap6":{title:"Powers of the Court of Appeal — Criminal Division",url:"https://www.legislation.gov.uk/ukpga/1968/19/section/2",body:`<p>On a conviction appeal, the Court of Appeal may:</p><ul><li>Quash the conviction and acquit.</li><li>Quash the conviction and order a retrial.</li><li>Substitute a conviction for an alternative offence.</li><li>Dismiss the appeal.</li></ul><p>On a sentence appeal, may quash, vary, or substitute sentence — but <strong>cannot increase it beyond the Crown Court's powers</strong>.</p><p><strong>Prosecution rights of appeal:</strong></p><ul><li><em>Attorney-General's Reference:</em> Unduly lenient Crown Court sentences — s.36 CJA 1988.</li><li><em>Terminating rulings:</em> May appeal rulings such as stays of proceedings or no case findings.</li><li><em>Double jeopardy exception:</em> May apply to quash an acquittal for a qualifying offence (e.g. homicide, rape) where there is new and compelling evidence — Court of Appeal orders a retrial if granted.</li><li><em>Supreme Court:</em> Appeals possible only where a point of law of general public importance is certified.</li></ul>`},
"clp_yc1":{title:"Youth Court Jurisdiction and Grave Crimes — Crime and Disorder Act 1998",url:"https://www.legislation.gov.uk/ukpga/1998/37/section/37",body:`<p>There is a strong presumption that children and young people will be tried and sentenced in the <strong>youth court</strong>. Parents or guardians of defendants under 16 must attend unless the court considers their absence reasonable.</p><ul><li><strong>Cases that must be sent to the Crown Court:</strong> Homicide (murder, manslaughter, attempted murder); certain firearms offences; "specified offences" where a dangerous offender sentence under s.308 Sentencing Act 2020 may be required; "grave crimes" (punishable by at least 14 years for an adult, e.g. rape, robbery, causing death by dangerous driving) where youth court sentencing powers are insufficient; indictable offence jointly charged with an adult where joint trial is in the interests of justice.</li><li>The principal statutory aim of youth justice (s.37(1) CDA 1998) is <strong>the prevention of offending and reoffending by children and young people</strong>.</li><li>The welfare principle (s.44(1) CYPA 1933) requires courts to consider the welfare of the child or young person.</li></ul>`},
"clp_yc2":{title:"Allocation in Youth Court — Age at Start of Proceedings",url:"https://www.legislation.gov.uk/ukpga/1980/43/contents",body:`<p>The general rule is that mode of trial is determined in accordance with a defendant's <strong>age at the start of proceedings</strong>.</p><ul><li><strong>Turns 18 before proceedings commence:</strong> Case is remitted to the adult magistrates' court (or Crown Court if indictable-only). The youth court has no jurisdiction.</li><li><strong>Turns 18 during proceedings:</strong> The youth court may retain jurisdiction or remit to the adult magistrates' court. If remitted, the defendant loses access to youth disposals and becomes subject to adult sentencing.</li><li><strong>Convicted before 18, sentenced after:</strong> The youth court retains power to impose a youth sentence. If remitted to the adult court, sentencing is in accordance with youth disposals.</li></ul>`},
"clp_yc3":{title:"Youths Jointly Charged with an Adult",url:"https://www.legislation.gov.uk/ukpga/1980/43/contents",body:`<p>A young person will appear in the <strong>adult magistrates' court</strong> (rather than the youth court) where they are:</p><ul><li>Jointly charged with an adult.</li><li>Charged with aiding and abetting an adult.</li><li>Charged with an offence connected to that of an adult co-defendant.</li></ul><p>In such cases, the adult magistrates' court considers whether it is in the <strong>interests of justice</strong> for the young person to be tried jointly with the adult. If so, the young person may be sent to the Crown Court alongside the adult. If not, the matter is remitted to the youth court.</p>`},
"clp_yc4":{title:"Youth Sentencing Guidelines — Sentencing Council 2017",url:"https://www.sentencingcouncil.org.uk/overarching-guides/magistrates-court/item/sentencing-children-and-young-people/",body:`<p>The Sentencing Council Guideline (2017) requires courts to consider the following when sentencing children and young people:</p><ul><li>The principal aim of <strong>preventing offending and reoffending</strong>.</li><li>The <strong>welfare of the child</strong> (s.44(1) CYPA 1933).</li><li>Statutory purposes of sentencing: punishment; reform and rehabilitation; protection of the public; reparation.</li><li>Importance of avoiding unnecessary criminalisation and promoting reintegration.</li><li>The guideline recognises the <strong>impulsivity and vulnerability</strong> of children and emphasises assessing both psychological and chronological age.</li><li><strong>Scaled approach:</strong> Sentencing interventions recommended by Youth Offending Teams (YOTs) must be tailored to the child's individual risks and needs.</li><li>Adult guidelines may inform starting points but cannot be applied directly to young offenders.</li></ul>`},
"clp_yc5":{title:"Referral Orders — Powers of Criminal Courts (Sentencing) Act 2000",url:"https://www.legislation.gov.uk/ukpga/2000/6/section/16",body:`<p>Referral orders are <strong>mandatory for first-time offenders pleading guilty</strong> (with limited exceptions), and discretionary otherwise.</p><ul><li>Require attendance before a <strong>Youth Offender Panel</strong>, where a programme of behaviour is agreed in the form of a contract with the young person and their parent/guardian.</li><li>The contract may include: reparation to the victim; community service; participation in programmes; attendance at school or work; staying away from certain people or places.</li><li><strong>Duration:</strong> 3 to 12 months.</li><li>Successful completion: the conviction is deemed "spent" for the purposes of the Rehabilitation of Offenders Act 1974.</li><li>Breach of the terms of the contract results in return to the youth court for resentencing.</li></ul>`},
"clp_yc6":{title:"Detention and Training Orders (DTOs) — Powers of Criminal Courts (Sentencing) Act 2000",url:"https://www.legislation.gov.uk/ukpga/2000/6/section/100",body:`<p>The <strong>Detention and Training Order (DTO)</strong> is the principal custodial sentence for young offenders.</p><ul><li>Available only where the <strong>custody threshold</strong> is crossed and a custodial sentence is justified.</li><li><strong>Duration:</strong> 4, 6, 8, 10, 12, 18, or 24 months. The offender serves the first half in custody and the second half under community supervision.</li><li><strong>Age restrictions:</strong> Cannot be imposed on those under 12. Only on 12–14-year-olds if they are <em>persistent offenders</em>. Available for 15–17-year-olds without restriction (subject to the custody threshold).</li><li>Breach of supervision conditions during the community element can result in return to custody for up to the period remaining.</li></ul>`},
"clp_yc7":{title:"Youth Rehabilitation Orders (YROs) — Criminal Justice and Immigration Act 2008",url:"https://www.legislation.gov.uk/ukpga/2008/4/section/1",body:`<p>The <strong>Youth Rehabilitation Order (YRO)</strong> is the principal community sentence for young offenders.</p><ul><li>Available where the offence is serious enough but does <strong>not</strong> cross the custody threshold. Proportionality and welfare considerations are central.</li><li><strong>Maximum term:</strong> 3 years.</li><li><strong>Requirements may include:</strong> Unpaid work; supervision; curfew; exclusion; electronic monitoring; drug or alcohol treatment; activity requirements; programme requirements; attendance centre; mental health treatment.</li><li><strong>Breach:</strong> May result in resentencing for the original offence; more onerous requirements being added; or a DTO being imposed.</li></ul>`},
"clp_w1":{title:"Welsh Language in Criminal Proceedings — Welsh Language Act 1993, s.22",url:"https://www.legislation.gov.uk/ukpga/1993/38/section/22",body:`<p>Under s.22 of the <strong>Welsh Language Act 1993</strong>, any party, witness, or other participant in legal proceedings in Wales may use Welsh in speech or writing. Welsh and English have equal status in court proceedings in Wales.</p><ul><li>The court arranges and funds interpreters if required — the cost does not fall on the participant who wishes to use Welsh.</li><li>In the Crown Court, during the plea and case management hearing, the court must ask the defendant's language preference.</li><li>If not given voluntarily, the court can set a deadline for providing this information.</li></ul>`}
};


const ALL=SUBJECTS.flatMap(s=>s.sections.flatMap(sec=>sec.topics));
const TOTAL=ALL.length;
// Confidence colours: 0=empty, 1=red, 2=orange, 3=yellow, 4=light green, 5=green
const CC=["rgba(0,0,0,0.08)","#FF3B30","#FF9500","#FFCC00","#30D158","#34C759"];

let ST={};
let GHTOKEN=null,GHGISTID=null;
try{ST=JSON.parse(localStorage.getItem("sqe_flk2_v3")||"{}");}catch{}
try{GHTOKEN=localStorage.getItem("sqe_gh_token");}catch{}
try{GHGISTID=localStorage.getItem("sqe_gh_gistid");}catch{}
let VIEW="dashboard",SUBJ=SUBJECTS[0].id,OPENSEC={},OPENDET={},OPENCASES={},OPENINFO={},MID=null,MACT=null;

function save(){try{localStorage.setItem("sqe_flk2_v3",JSON.stringify(ST));}catch{}if(GHTOKEN&&GHGISTID)syncToGitHub();}
function syncToGitHub(){if(!GHTOKEN||!GHGISTID)return;fetch("https://api.github.com/gists/"+GHGISTID,{method:"PATCH",headers:{"Authorization":"token "+GHTOKEN,"Content-Type":"application/json"},body:JSON.stringify({files:{"sqe_flk2_progress.json":{content:JSON.stringify(ST)}}})}).catch(e=>console.log("GitHub sync skipped"));}
function syncFromGitHub(){if(!GHTOKEN||!GHGISTID){alert("GitHub not connected.");return;}fetch("https://api.github.com/gists/"+GHGISTID,{method:"GET",headers:{"Authorization":"token "+GHTOKEN}}).then(r=>r.json()).then(data=>{const file=data.files?.["sqe_flk2_progress.json"];if(file?.content){try{ST=JSON.parse(file.content);save();updateHeader();if(VIEW==="dashboard")renderDash();else renderMatrix();alert("✓ Synced from GitHub!");}catch{alert("Error reading GitHub data");}}else{alert("No progress file found on GitHub");}}).catch(e=>{alert("Failed to sync from GitHub.");console.log(e);});}
function setupGitHub(){const token=prompt("Enter your GitHub Personal Access Token:\n(Create one at github.com/settings/tokens with 'gist' scope)");if(!token)return;GHTOKEN=token;localStorage.setItem("sqe_gh_token",token);const gistId=prompt("Enter your Gist ID (or leave blank to create a new one):");if(gistId){GHGISTID=gistId;localStorage.setItem("sqe_gh_gistid",gistId);syncToGitHub();alert("✓ GitHub connected!");}else{createNewGist(token);}}
function createNewGist(token){fetch("https://api.github.com/gists",{method:"POST",headers:{"Authorization":"token "+token,"Content-Type":"application/json"},body:JSON.stringify({description:"SQE FLK2 Training Matrix Progress",public:false,files:{"sqe_flk2_progress.json":{content:JSON.stringify(ST)}}})}).then(r=>r.json()).then(data=>{if(data.id){GHGISTID=data.id;localStorage.setItem("sqe_gh_gistid",data.id);alert("✓ New Gist created! ID: "+data.id);}else{alert("Failed to create Gist.");}}).catch(e=>{alert("Failed to create Gist");console.log(e);});}
function clearGithub(){if(confirm("Disconnect GitHub? (Local data preserved)")){GHTOKEN=null;GHGISTID=null;localStorage.removeItem("sqe_gh_token");localStorage.removeItem("sqe_gh_gistid");if(VIEW==="dashboard")renderDash();alert("✓ GitHub disconnected");}}
function td(id){return ST[id]||{confidence:0,activities:{}};}
function cc(p){return p>60?"#34C759":p>30?"#FF9500":p>0?"#FF3B30":"#AEAEB2";}
function days(a,b){return Math.floor((b-a)/86400000);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function oConf(){const s=ALL.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0);return Math.round(s/(TOTAL*5)*100);}
function sConf(subj){const t=subj.sections.flatMap(s=>s.topics);const s=t.reduce((a,x)=>a+(ST[x.id]?.confidence||0),0);return Math.round(s/(t.length*5)*100);}
function secConf(sec){const s=sec.topics.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0);return Math.round(s/(sec.topics.length*5)*100);}
function totSess(){let c=0;Object.values(ST).forEach(d=>ACTS.forEach(a=>c+=(d.activities?.[a.key]||[]).length));return c;}
function topStart(){return ALL.filter(t=>ACTS.some(a=>(ST[t.id]?.activities?.[a.key]||[]).length>0)).length;}

function updateHeader(){
  const p=oConf();
  document.getElementById("overall-pct").textContent=p+"%";
  document.getElementById("overall-pct").style.color=cc(p);
  document.getElementById("cpct-lbl").textContent=p+"%";
  document.getElementById("cbar").style.width=p+"%";
  const now=new Date(),el=Math.max(0,days(SD,now)),tot=days(SD,ED),rem=Math.max(0,days(now,ED)),tp=Math.min(100,Math.round(el/tot*100));
  document.getElementById("tlbl").textContent=el+"/"+tot+" days ("+rem+" remaining)";
  document.getElementById("tbar").style.width=tp+"%";
  document.getElementById("hsub").textContent=SD.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" → "+ED.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" · "+TOTAL+" topic lines";
}

function showView(v){
  VIEW=v;
  document.querySelectorAll(".nav-btn").forEach(b=>{b.classList.toggle("active",b.textContent.toLowerCase()===v);});
  document.getElementById("vdash").style.display=v==="dashboard"?"":"none";
  document.getElementById("vmatrix").style.display=v==="matrix"?"":"none";
  if(v==="dashboard")renderDash();
  if(v==="matrix")renderMatrix();
}

function renderDash(){
  const p=oConf(),now=new Date(),rem=Math.max(0,days(now,ED)),el=Math.max(0,days(SD,now)),tot=days(SD,ED),tp=Math.min(100,Math.round(el/tot*100));
  const stats=[
    {label:"Overall Confidence",value:p+"%",sub:TOTAL+" topic lines",color:cc(p)},
    {label:"Topics Started",value:topStart(),sub:"of "+TOTAL+" total",color:"#007AFF"},
    {label:"Sessions Logged",value:totSess(),sub:"across all activities",color:"#34C759"},
    {label:"Days Remaining",value:rem,sub:"of 122 total · "+tp+"% elapsed",color:"#FF9500"},
  ];
  let h='<div class="stat-grid">';
  stats.forEach(s=>{h+=`<div class="stat-card"><div class="stat-lbl">${s.label}</div><div class="stat-val" style="color:${s.color}">${s.value}</div><div class="stat-sub">${s.sub}</div></div>`;});
  h+='</div><div class="sec-title">Subject Confidence</div><div class="subj-grid">';
  SUBJECTS.forEach(s=>{
    const sp=sConf(s),ts=s.sections.flatMap(x=>x.topics),done=ts.filter(t=>(ST[t.id]?.confidence||0)>0).length;
    h+=`<div class="subj-card" onclick="goSub('${s.id}')">
      <div class="subj-top">
        <div>
          <div class="subj-name" style="color:${s.color}">${esc(s.name)}</div>
          <div class="subj-s">${done} of ${ts.length} topics with confidence set</div>
        </div>
        <div class="subj-pct" style="color:${cc(sp)}">${sp}%</div>
      </div>
      <div class="pb-track"><div class="pb-fill" style="width:${sp}%;background:${s.color}"></div></div>
      <div class="subj-hint">Open training matrix →</div>
    </div>`;
  });
  h+='</div><div class="key-card"><div class="sec-title" style="margin-bottom:14px">Activity Types</div><div class="key-grid">';
  ACTS.forEach(a=>{h+=`<div class="key-item"><div class="key-icon" style="background:${a.color}18">${a.icon}</div><div><div class="key-name">${a.label}</div><div class="key-s">${a.key==="mcq"?"Log with date, score & notes":"Log with date & notes"}</div></div></div>`;});
  h+=`</div><div class="key-note">Confidence rated 0–5 per topic line · Overall = total scored ÷ (topics × 5) × 100%</div>
  <div class="backup-row">
    <button class="exp-btn" onclick="exportData()">⬇ Export</button>
    <label class="imp-btn">⬆ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
    <button class="${GHTOKEN?"gh-btn-connected":"gh-btn-disconnected"}" onclick="${GHTOKEN?"syncFromGitHub()":"setupGitHub()}"}">${GHTOKEN?"☁ Sync from GitHub":"☁ Connect GitHub"}</button>
    ${GHTOKEN?`<button class="exp-btn" onclick="clearGithub()">Disconnect</button>`:""}
    <button class="danger-btn" onclick="resetAll()">Reset All</button>
  </div></div>`;
  document.getElementById("vdash").innerHTML=h;
}

function goSub(id){SUBJ=id;showView("matrix");}

function renderMatrix(){
  const subj=SUBJECTS.find(s=>s.id===SUBJ)||SUBJECTS[0];
  const ts=subj.sections.flatMap(s=>s.topics),sp=Math.round(ts.reduce((a,t)=>a+(ST[t.id]?.confidence||0),0)/(ts.length*5)*100);
  let h='<div id="stabs">';
  SUBJECTS.forEach(s=>{const ac=s.id===SUBJ;h+=`<button class="stab" style="${ac?`color:${s.color};border-color:${s.color}33;background:${s.color}12;font-weight:600`:""}" onclick="switchSub('${s.id}')">${esc(s.name.split(" ").slice(0,3).join(" "))}</button>`;});
  h+=`</div><div id="mhdr"><div><div id="mtitle" style="color:${subj.color}">${esc(subj.name)}</div><div id="msub">${ts.length} topic lines · ${sp}% confident</div></div><div id="mpct" style="color:${cc(sp)}">${sp}%</div></div><div id="scon">`;
  subj.sections.forEach(sec=>{h+=renderSec(sec,subj.color);});
  h+='</div>';
  document.getElementById("vmatrix").innerHTML=h;
}

function renderSec(sec,color){
  const isO=OPENSEC[sec.id]!==false,sp=secConf(sec);
  let h=`<div class="secblock" id="sb-${sec.id}"><button class="sechdr${isO?" open":""}" onclick="togSec('${sec.id}')"><span>${esc(sec.name)}</span><div class="sechr"><span class="sec-pct-pill" style="color:${cc(sp)}">${sp}%</span><span class="chev">${isO?"▲":"▼"}</span></div></button>`;
  if(isO){h+='<div class="sectopics">';sec.topics.forEach((t,i)=>{h+=renderRow(t,i,sec.topics.length,color);});h+='</div>';}
  h+='</div>';return h;
}

function renderRow(t,idx,total,color){
  const d=td(t.id),conf=d.confidence||0,acts=d.activities||{},actC=ACTS.reduce((a,at)=>a+(acts[at.key]||[]).length,0),isD=OPENDET[t.id],bg=idx%2===0?"#FFFFFF":"#FAFAFA";
  let cb='<div class="cgrp"><span class="clbl">Conf</span>';
  for(let n=1;n<=5;n++){cb+=`<button class="cbtn" style="background:${conf>=n?CC[n]:CC[0]};color:${conf>=n?"#fff":"#AEAEB2"}" onclick="setC('${t.id}',${n})">${n}</button>`;}
  cb+='</div>';
  let ab='<div class="agrp">';
  ACTS.forEach(at=>{const lg=(acts[at.key]||[]).length;ab+=`<button class="abtn" title="${at.label} (${lg})" style="${lg>0?`border-color:${at.color}55;background:${at.color}12`:""}" onclick="openM('${t.id}','${at.key}')">${at.icon}${lg>0?`<span class="abadge" style="background:${at.color}">${lg}</span>`:""}</button>`;});
  ab+='</div>';
  let det='';
  if(isD&&actC>0){
    det='<div class="tdetail">';
    ACTS.filter(at=>(acts[at.key]||[]).length>0).forEach(at=>{
      det+=`<div class="dlbl" style="color:${at.color};margin-top:8px">${at.icon} ${at.label}</div>`;
      (acts[at.key]||[]).forEach((e,i)=>{det+=`<div class="dentry"><span>${esc(e.date)}${e.score?" · "+esc(e.score):""}${e.note?" · "+esc(e.note):""}</span><button class="ddel" onclick="delA('${t.id}','${at.key}',${i})">×</button></div>`;});
    });
    det+='</div>';
  }
  const tc=CASES[t.id]||[];
  let cpanel='';
  if(tc.length>0){
    const isC=OPENCASES[t.id];
    cpanel=`<div class="cases-panel"><button class="cases-toggle" onclick="togCases('${t.id}')">${isC?"▾":"▸"} Key Cases (${tc.length})</button>`;
    if(isC){cpanel+='<div class="cases-list">';tc.forEach(cs=>{cpanel+=`<div class="case-item">${esc(cs)}</div>`;});cpanel+='</div>';}
    cpanel+='</div>';
  }
  const info=INFO[t.id];
  const infoBtn=info?`<button class="info-btn${OPENINFO[t.id]?" active":""}" onclick="togInfo('${t.id}')" title="View notes">𝑖</button>`:"";
  let infoPanel="";
  if(info&&OPENINFO[t.id]){
    infoPanel=`<div class="info-panel"><div class="info-header"><span class="info-header-icon">📋</span><span class="info-header-title">${esc(info.title)}</span>${info.url?`<a class="info-header-link" href="${info.url}" target="_blank" rel="noopener">Legislation ↗</a>`:""}</div><div class="info-body">${info.body}</div></div>`;
  }
  return `<div class="trow" id="row-${t.id}" style="background:${bg}"><div class="trow-main"><div class="ttext" onclick="togDet('${t.id}')">${esc(t.text)}</div>${cb}${ab}${infoBtn}</div>${infoPanel}${det}${cpanel}</div>`;
}

function setC(id,v){const d=td(id);d.confidence=(d.confidence===v)?0:v;ST[id]=d;save();rerenderRow(id);updateHeader();if(VIEW==="dashboard")renderDash();}
function delA(id,key,i){const d=td(id);d.activities[key].splice(i,1);ST[id]=d;save();rerenderRow(id);if(VIEW==="dashboard")renderDash();}
function togInfo(id){OPENINFO[id]=!OPENINFO[id];rerenderRow(id);}
function togSec(id){OPENSEC[id]=OPENSEC[id]===false;const subj=SUBJECTS.find(s=>s.sections.some(sec=>sec.id===id));const sec=subj?.sections.find(sec=>sec.id===id);if(!sec)return;const el=document.getElementById("sb-"+id);if(el)el.outerHTML=renderSec(sec,subj.color);}
function togDet(id){OPENDET[id]=!OPENDET[id];rerenderRow(id);}
function switchSub(id){SUBJ=id;renderMatrix();}
function togCases(id){OPENCASES[id]=!OPENCASES[id];rerenderRow(id);}

function rerenderRow(id){
  const el=document.getElementById("row-"+id);if(!el)return;
  const subj=SUBJECTS.find(s=>s.sections.some(sec=>sec.topics.some(t=>t.id===id)));
  const sec=subj?.sections.find(sec=>sec.topics.some(t=>t.id===id));if(!sec)return;
  const t=sec.topics.find(t=>t.id===id),i=sec.topics.indexOf(t);
  el.outerHTML=renderRow(t,i,sec.topics.length,subj.color);
  const sb=document.getElementById("sb-"+sec.id);
  if(sb){const sp=secConf(sec);const pEl=sb.querySelector(".sec-pct-pill");if(pEl){pEl.textContent=sp+"%";pEl.style.color=cc(sp);}}
  const mp=document.getElementById("mpct"),ms=document.getElementById("msub");
  if(mp&&ms){const subj2=SUBJECTS.find(s=>s.id===SUBJ);if(subj2){const ts=subj2.sections.flatMap(s=>s.topics),sp2=Math.round(ts.reduce((a,t2)=>a+(ST[t2.id]?.confidence||0),0)/(ts.length*5)*100);mp.textContent=sp2+"%";mp.style.color=cc(sp2);ms.textContent=ts.length+" topic lines · "+sp2+"% confident";}}
}

function openM(topicId,actKey){
  MID=topicId;MACT=actKey;
  const act=ACTS.find(a=>a.key===actKey),topic=ALL.find(t=>t.id===topicId);
  document.getElementById("mtlbl").textContent=act.icon+" Log "+act.label+" Session";
  document.getElementById("mtlbl").style.color=act.color;
  document.getElementById("mtopic").textContent=topic.text;
  document.getElementById("mdate").value=todayStr();
  document.getElementById("mscore").value="";
  document.getElementById("mnote").value="";
  document.getElementById("mscore-grp").style.display=actKey==="mcq"?"":"none";
  document.getElementById("mnote").placeholder=actKey==="mcq"?"e.g. Kaplan practice set, weak on mens rea...":"e.g. Listened to lecture, completed flashcards...";
  document.getElementById("mok").style.background=act.color;
  renderPrev();
  document.getElementById("moverlay").classList.add("show");
}
function renderPrev(){
  const d=td(MID),ex=d.activities?.[MACT]||[];
  if(!ex.length){document.getElementById("mprev").innerHTML="";return;}
  let h='<div class="prevlbl" style="margin-bottom:8px">Previous Sessions</div>';
  ex.forEach((e,i)=>{h+=`<div class="prevrow"><span>${esc(e.date)}${e.score?" · "+esc(e.score):""}${e.note?" · "+esc(e.note):""}</span><button class="prevdel" onclick="delAModal(${i})">×</button></div>`;});
  document.getElementById("mprev").innerHTML=h;
}
function delAModal(i){const d=td(MID);d.activities[MACT].splice(i,1);ST[MID]=d;save();rerenderRow(MID);renderPrev();if(VIEW==="dashboard")renderDash();}
function submitLog(){const date=document.getElementById("mdate").value;if(!date)return;const note=document.getElementById("mnote").value.trim(),score=document.getElementById("mscore").value.trim();const d=td(MID);if(!d.activities[MACT])d.activities[MACT]=[];d.activities[MACT].push({date,note,score});ST[MID]=d;save();rerenderRow(MID);closeModal();if(VIEW==="dashboard")renderDash();}
function closeModal(){document.getElementById("moverlay").classList.remove("show");MID=null;MACT=null;}
function exportData(){const blob=new Blob([JSON.stringify(ST,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="sqe_flk2_progress_"+todayStr()+".json";a.click();URL.revokeObjectURL(a.href);}
function importData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){try{const imported=JSON.parse(ev.target.result);if(typeof imported!=="object"||Array.isArray(imported))throw new Error();ST=imported;save();updateHeader();if(VIEW==="dashboard")renderDash();else renderMatrix();alert("Progress imported!");}catch{alert("Could not read file.");}};reader.readAsText(file);e.target.value="";}
function resetAll(){if(confirm("This will permanently delete all progress. Are you sure?")){if(confirm("Cannot be undone. Confirm reset.")){ST={};save();updateHeader();if(VIEW==="dashboard")renderDash();else renderMatrix();alert("✓ Reset complete.");}}}
function loadGitHubOnStart(){if(GHTOKEN&&GHGISTID){fetch("https://api.github.com/gists/"+GHGISTID,{method:"GET",headers:{"Authorization":"token "+GHTOKEN}}).then(r=>r.json()).then(data=>{const file=data.files?.["sqe_flk2_progress.json"];if(file?.content){try{ST=JSON.parse(file.content);save();}catch{}}}).catch(e=>console.log("GitHub load skipped"));}}

updateHeader();loadGitHubOnStart();renderDash();
</script>
